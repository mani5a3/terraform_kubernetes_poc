# If pods remain pending due to insufficient resources, Karpenter provisions a new node that satisfies the pod resource requests, provided the instance type is allowed in the NodePool.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        resources:
          requests:
            cpu: "500m"
            memory: "10Gi"