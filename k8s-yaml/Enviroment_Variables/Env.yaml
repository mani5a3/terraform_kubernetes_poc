---
apiVersion: v1
kind: Pod
metadata:
  name: environment-variables-pod
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80
      env:
        - name: username
          value: Admin
      command: ["/bin/sh", "-c"]
      args:
        - echo "Username is $username" && sleep 3600
