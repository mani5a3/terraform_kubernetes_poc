# kubectl create secret  <secret-Name> --from-literal=<key>=<value>
# kubectl create secret  <secret-Name> --from-file=pathtofile
# convert text to encoded format using echo -n "123456" | base64
# to decode echo -n "MTIzNDU2" | base64 --decode
# ❌ Environment variables from ConfigMaps or Secrets CANNOT be updated in a running Pod.
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
data:
  password: MTIzNDU2 # encoded with base64