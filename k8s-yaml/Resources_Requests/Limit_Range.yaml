---
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limitrange
  namespace: default
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "200m"
        memory: "128Mi"

