# check ebs csi driver is available or not - kubectl get pods -n kube-system
# aws eks create-addon --cluster-name <cluster-name> --addon-name aws-ebs-csi-driver
# aws eks describe-addon --cluster-name terraform-eks-cluster --addon-name aws-ebs-csi-driver --query "addon.status"
# # check oidc conector created or not

# | Mode          | Meaning                       |
# | ------------- | ----------------------------- |
# | ReadWriteOnce | Mounted by only one node      |
# | ReadWriteMany | Multiple nodes can read/write |
# | ReadOnlyMany  | Multiple nodes can read       |

# only CSI controller need AWS permissions , your apps pods doesnt' required
                # EBS Volume (created manually in AWS)
                #         ↓
                # PersistentVolume (cluster-scoped)
                #         ↓
                # PVC (default namespace)
                #         ↓
                # App Pod (default namespace)
                #         ↓
                # EBS CSI Controller (kube-system)
                #         ↓
                # AWS API (AttachVolume call)
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-persistent-volume
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  #persistentVolumeReclaimPolicy: Delete
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-0b6ea0976352db0ef
    fsType: ext4